<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Kid Goals Tracker</title>
<meta name="theme-color" content="#FF9900">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Goals">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1923;--panel:#162230;--border:#2a3a4e;--text:#e0e0e0;--muted:#7a8a9e;
  --orange:#FF9900;--blue:#56b8ff;--green:#66d97a;--yellow:#f0c850;--red:#ff6b6b;--purple:#c792ea;--pink:#ff6fa3;
}
body{font-family:-apple-system,'Segoe UI','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;padding:env(safe-area-inset-top) 16px calc(80px + env(safe-area-inset-bottom)) 16px;max-width:720px;margin:0 auto;-webkit-text-size-adjust:100%}

/* Header */
.header{padding:16px 0 20px;text-align:center}
.header h1{font-size:22px;font-weight:800;color:var(--orange);margin-bottom:4px}
.header .date{color:var(--muted);font-size:13px}

/* Sections */
.section{margin-bottom:24px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:10px;padding-left:4px}

/* Dashboard stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.stat-value{font-size:22px;font-weight:800;color:var(--orange);line-height:1}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* Goal cards */
.goal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;transition:.2s;position:relative;overflow:hidden}
.goal::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--orange);opacity:0.6}
.goal.done-today::before{background:var(--green);opacity:1}
.goal.done-today{background:linear-gradient(135deg,#1a3a2a,#162230)}
.goal-row{display:flex;align-items:center;gap:12px}
.goal-icon{font-size:32px;flex-shrink:0;width:48px;text-align:center}
.goal-main{flex:1;min-width:0}
.goal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.goal-sub{font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.goal-sub .streak{color:var(--yellow);font-weight:600}
.goal-sub .progress{color:var(--blue);font-weight:600}
.goal-sub .type{font-size:10px;background:rgba(255,153,0,0.15);color:var(--orange);padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.goal-action{flex-shrink:0}
.check-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--border);background:var(--bg);color:var(--muted);font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.check-btn:active{transform:scale(0.9)}
.check-btn.done{background:var(--green);border-color:var(--green);color:#000}
.count-btn{width:auto;padding:0 16px;height:48px;border-radius:24px;border:2px solid var(--blue);background:var(--bg);color:var(--blue);font-size:14px;font-weight:700;cursor:pointer}
.count-btn:active{transform:scale(0.95)}
.milestone-btn{background:var(--purple);border-color:var(--purple);color:#000}

/* Progress bar for counter goals */
.goal-progress-bar{margin-top:10px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.goal-progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));transition:width 0.5s;border-radius:4px}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .emoji{font-size:48px;margin-bottom:12px}
.empty .msg{font-size:14px;margin-bottom:20px}

/* Floating action button */
.fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:20px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--orange),#ffb347);border:none;color:#000;font-size:32px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(255,153,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(0.9)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--panel);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:720px;max-height:90vh;overflow-y:auto;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:18px;color:var(--orange);margin-bottom:16px}
.modal .close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-family:inherit;font-size:15px}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--orange)}
.emoji-picker{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:8px}
.emoji-option{font-size:24px;padding:8px;background:var(--bg);border:2px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;transition:.1s}
.emoji-option.selected{border-color:var(--orange);background:rgba(255,153,0,0.15)}
.type-selector{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.type-option{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;transition:.1s}
.type-option.selected{border-color:var(--orange);background:rgba(255,153,0,0.1)}
.type-option .t-icon{font-size:22px;margin-bottom:4px}
.type-option .t-name{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:1px}
.type-option .t-desc{font-size:10px;color:var(--muted);margin-top:2px}
.btn-row{display:flex;gap:8px;margin-top:20px}
.btn{flex:1;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--orange);color:#000}
.btn-primary:active{background:#e88a00}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}

/* Recent activity */
.activity{font-size:12px;color:var(--muted);padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:8px}
.activity:last-child{border-bottom:none}
.activity .time{color:var(--muted);font-size:11px}

/* Celebration */
.celebration{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.celebration.show{display:flex}
.celebration-card{background:linear-gradient(135deg,#1a3a2a,#2a5a42);border:2px solid var(--green);border-radius:20px;padding:32px;text-align:center;max-width:320px;animation:pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes pop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.celebration-emoji{font-size:72px;margin-bottom:12px}
.celebration-title{font-size:22px;font-weight:800;color:var(--green);margin-bottom:8px}
.celebration-msg{font-size:14px;color:var(--text);margin-bottom:20px;line-height:1.5}

/* Settings */
.settings-row{display:flex;gap:8px}
.settings-btn{flex:1;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit}
.settings-btn:active{background:var(--border)}

.calendar-strip{display:flex;gap:4px;overflow-x:auto;padding:4px 0;margin-top:8px;-webkit-overflow-scrolling:touch}
.cal-day{flex-shrink:0;width:36px;height:44px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--muted)}
.cal-day.done{background:var(--green);border-color:var(--green);color:#000;font-weight:700}
.cal-day.today{border-color:var(--orange);border-width:2px}
.cal-day .cal-num{font-size:12px;font-weight:700}

/* Kid selector */
.kid-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.kid-select{background:var(--bg);border:1px solid var(--border);color:var(--orange);padding:8px 12px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;min-width:120px;text-align:center}
.kid-select:focus{outline:none;border-color:var(--orange)}
.kid-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.kid-btn:active{background:var(--border)}

@media(max-width:430px){
  body{padding:env(safe-area-inset-top) 12px calc(80px + env(safe-area-inset-bottom)) 12px}
  .header h1{font-size:20px}
  .stat-value{font-size:18px}
  .goal-title{font-size:14px}
}
</style>
</head>
<body>

<div class="header">
  <h1>🌟 Goals Tracker</h1>
  <div class="kid-bar">
    <select class="kid-select" id="kidSelect" onchange="switchKid(this.value)"></select>
    <button class="kid-btn" onclick="openAddKid()" title="Add kid">+</button>
    <button class="kid-btn" onclick="openManageKids()" title="Manage kids">⚙</button>
  </div>
  <div class="date" id="dateDisplay"></div>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-value" id="statActive">0</div><div class="stat-label">Active Goals</div></div>
  <div class="stat"><div class="stat-value" id="statToday">0</div><div class="stat-label">Done Today</div></div>
  <div class="stat"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Best Streak</div></div>
</div>

<div class="section">
  <div class="section-title">🎯 Today's Goals</div>
  <div id="goalsList"></div>
</div>

<div class="section" id="completedSection" style="display:none">
  <div class="section-title">✅ Completed Milestones</div>
  <div id="completedList"></div>
</div>

<div class="section">
  <div class="section-title">📋 Recent Activity</div>
  <div id="activityList" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px"></div>
</div>

<div class="section">
  <div class="section-title">⚙️ Settings</div>
  <div class="settings-row">
    <button class="settings-btn" onclick="exportData()">📤 Export Backup</button>
    <button class="settings-btn" onclick="document.getElementById('importFile').click()">📥 Import</button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<button class="fab" onclick="openAddGoal()">+</button>

<!-- Add/Edit Goal Modal -->
<div class="modal-overlay" id="goalModal">
  <div class="modal" style="position:relative">
    <button class="close" onclick="closeModal()">×</button>
    <h2 id="modalTitle">New Goal</h2>
    
    <div class="field">
      <label>Goal title</label>
      <input type="text" id="goalTitle" placeholder="e.g. Read for 20 minutes" maxlength="60">
    </div>
    
    <div class="field">
      <label>Pick an icon</label>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
    
    <div class="field">
      <label>Goal type</label>
      <div class="type-selector">
        <div class="type-option" data-type="daily" onclick="selectType('daily')">
          <div class="t-icon">📅</div>
          <div class="t-name">Daily</div>
          <div class="t-desc">Every day</div>
        </div>
        <div class="type-option" data-type="counter" onclick="selectType('counter')">
          <div class="t-icon">🔢</div>
          <div class="t-name">Counter</div>
          <div class="t-desc">Count up to target</div>
        </div>
        <div class="type-option" data-type="milestone" onclick="selectType('milestone')">
          <div class="t-icon">🏆</div>
          <div class="t-name">One-time</div>
          <div class="t-desc">One big goal</div>
        </div>
      </div>
    </div>
    
    <div class="field" id="targetField" style="display:none">
      <label>Target count</label>
      <input type="number" id="goalTarget" placeholder="e.g. 50" min="1">
    </div>
    
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteGoal()" style="display:none">Delete</button>
      <button class="btn btn-primary" onclick="saveGoal()">Save</button>
    </div>
  </div>
</div>

<!-- Celebration Modal -->
<div class="celebration" id="celebration" onclick="closeCelebration()">
  <div class="celebration-card">
    <div class="celebration-emoji" id="celEmoji">🎉</div>
    <div class="celebration-title" id="celTitle">Great job!</div>
    <div class="celebration-msg" id="celMsg"></div>
    <button class="btn btn-primary" onclick="closeCelebration()">Yay!</button>
  </div>
</div>

<script>
const EMOJIS=['📚','🧮','✏️','🎨','🏃','⚽','🚴','🏊','🎵','🎹','🦷','🛁','🧸','🧩','🌱','💤','🥦','💧','📖','🌟','🎯','🏆','💪','🧠','🎪','🎭','🎲','🎮','🍎','🌈'];

// Multi-kid data model
let kids=JSON.parse(localStorage.getItem('kidsList')||'[]');
let currentKidId=localStorage.getItem('currentKid')||'';

// Migrate old single-kid data
if(!kids.length){
  const oldGoals=JSON.parse(localStorage.getItem('kidGoals')||'[]');
  const oldActivity=JSON.parse(localStorage.getItem('kidActivity')||'[]');
  const firstId='kid_'+Date.now().toString(36);
  kids=[{id:firstId,name:'My Kid'}];
  currentKidId=firstId;
  localStorage.setItem('kidsList',JSON.stringify(kids));
  localStorage.setItem('currentKid',firstId);
  if(oldGoals.length||oldActivity.length){
    localStorage.setItem('goals_'+firstId,JSON.stringify(oldGoals));
    localStorage.setItem('activity_'+firstId,JSON.stringify(oldActivity));
  }
}
if(!currentKidId||!kids.find(k=>k.id===currentKidId)){currentKidId=kids[0].id;localStorage.setItem('currentKid',currentKidId)}

function loadKidData(){
  goals=JSON.parse(localStorage.getItem('goals_'+currentKidId)||'[]');
  activity=JSON.parse(localStorage.getItem('activity_'+currentKidId)||'[]');
}
let goals=[],activity=[];
loadKidData();
let editingId=null,selectedEmoji='🎯',selectedType='daily';

const todayKey=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};

function save(){
  localStorage.setItem('goals_'+currentKidId,JSON.stringify(goals));
  localStorage.setItem('activity_'+currentKidId,JSON.stringify(activity.slice(0,100)));
}

function renderKidSelect(){
  const sel=document.getElementById('kidSelect');
  sel.innerHTML=kids.map(k=>`<option value="${k.id}"${k.id===currentKidId?' selected':''}>${escape(k.name)}</option>`).join('');
}

function switchKid(id){
  currentKidId=id;
  localStorage.setItem('currentKid',id);
  loadKidData();
  render();
}

function openAddKid(){
  const name=prompt('Enter kid\'s name:');
  if(!name||!name.trim())return;
  const id='kid_'+Date.now().toString(36);
  kids.push({id,name:name.trim()});
  localStorage.setItem('kidsList',JSON.stringify(kids));
  switchKid(id);
}

function openManageKids(){
  const kid=kids.find(k=>k.id===currentKidId);
  const action=prompt(`Managing: ${kid.name}\n\nType "rename" to rename or "delete" to remove this kid:`);
  if(!action)return;
  if(action.trim().toLowerCase()==='rename'){
    const name=prompt('New name:',kid.name);
    if(name&&name.trim()){kid.name=name.trim();localStorage.setItem('kidsList',JSON.stringify(kids));render();}
  }else if(action.trim().toLowerCase()==='delete'){
    if(kids.length<2)return alert('You need at least one kid!');
    if(confirm(`Delete ${kid.name} and all their goals?`)){
      localStorage.removeItem('goals_'+kid.id);
      localStorage.removeItem('activity_'+kid.id);
      kids=kids.filter(k=>k.id!==kid.id);
      localStorage.setItem('kidsList',JSON.stringify(kids));
      switchKid(kids[0].id);
    }
  }
}

function calcStreak(goal){
  if(goal.type!=='daily'||!goal.completions||!goal.completions.length)return 0;
  const sortedDates=[...new Set(goal.completions)].sort().reverse();
  let streak=0;
  let d=new Date();
  for(let i=0;i<365;i++){
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(sortedDates.includes(key)){
      streak++;
      d.setDate(d.getDate()-1);
    }else{
      if(i===0){d.setDate(d.getDate()-1);continue}
      break;
    }
  }
  return streak;
}

function render(){
  const today=todayKey();
  const d=new Date();
  renderKidSelect();
  document.getElementById('dateDisplay').textContent=d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
  
  const activeGoals=goals.filter(g=>!g.archived&&g.type!=='milestone'||(g.type==='milestone'&&!g.completedAt));
  const milestonesDone=goals.filter(g=>g.type==='milestone'&&g.completedAt);
  
  document.getElementById('statActive').textContent=activeGoals.length;
  document.getElementById('statToday').textContent=goals.filter(g=>g.type==='daily'&&(g.completions||[]).includes(today)).length;
  document.getElementById('statStreak').textContent=Math.max(0,...goals.map(calcStreak));
  
  const list=document.getElementById('goalsList');
  if(!activeGoals.length){
    list.innerHTML=`<div class="empty"><div class="emoji">🌱</div><div class="msg">No goals yet. Tap the + button to add one!</div></div>`;
  }else{
    list.innerHTML=activeGoals.map(renderGoal).join('');
  }
  
  const compSection=document.getElementById('completedSection');
  const compList=document.getElementById('completedList');
  if(milestonesDone.length){
    compSection.style.display='block';
    compList.innerHTML=milestonesDone.slice(-5).reverse().map(g=>`
      <div class="goal" style="opacity:0.8">
        <div class="goal-row">
          <div class="goal-icon">${g.icon}</div>
          <div class="goal-main">
            <div class="goal-title">${escape(g.title)}</div>
            <div class="goal-sub">🏆 Done on ${new Date(g.completedAt).toLocaleDateString('en-AU')}</div>
          </div>
        </div>
      </div>`).join('');
  }else compSection.style.display='none';
  
  const actList=document.getElementById('activityList');
  if(!activity.length){
    actList.innerHTML='<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px">No activity yet</div>';
  }else{
    actList.innerHTML=activity.slice(0,8).map(a=>`
      <div class="activity">
        <span>${a.icon} ${escape(a.text)}</span>
        <span class="time">${timeAgo(a.ts)}</span>
      </div>`).join('');
  }
}

function renderGoal(g){
  const today=todayKey();
  const doneToday=g.type==='daily'&&(g.completions||[]).includes(today);
  const streak=calcStreak(g);
  let actionBtn='',progress='',sub='';
  
  if(g.type==='daily'){
    actionBtn=`<button class="check-btn ${doneToday?'done':''}" onclick="markDaily('${g.id}')">${doneToday?'✓':'○'}</button>`;
    sub=`<span class="type">daily</span>${streak>0?`<span class="streak">🔥 ${streak}-day streak</span>`:''}`;
    const last7=getLast7Days(g);
    progress=`<div class="calendar-strip">${last7.map(d=>`<div class="cal-day ${d.done?'done':''} ${d.today?'today':''}"><div style="font-size:9px">${d.dayName}</div><div class="cal-num">${d.num}</div></div>`).join('')}</div>`;
  }else if(g.type==='counter'){
    const count=g.count||0;
    const target=g.target||1;
    const pct=Math.min(100,(count/target)*100);
    actionBtn=`<button class="count-btn" onclick="incCounter('${g.id}')">+1</button>`;
    sub=`<span class="type">counter</span><span class="progress">${count} / ${target}</span>`;
    progress=`<div class="goal-progress-bar"><div class="goal-progress-fill" style="width:${pct}%"></div></div>`;
  }else{
    actionBtn=`<button class="check-btn milestone-btn" onclick="completeMilestone('${g.id}')">🏆</button>`;
    sub=`<span class="type">milestone</span><span>Tap trophy when done</span>`;
  }
  
  return `<div class="goal ${doneToday?'done-today':''}" onclick="event.target.closest('button')||editGoal('${g.id}')">
    <div class="goal-row">
      <div class="goal-icon">${g.icon}</div>
      <div class="goal-main">
        <div class="goal-title">${escape(g.title)}</div>
        <div class="goal-sub">${sub}</div>
      </div>
      <div class="goal-action">${actionBtn}</div>
    </div>
    ${progress}
  </div>`;
}

function getLast7Days(goal){
  const completions=goal.completions||[];
  const today=todayKey();
  const result=[];
  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(d.getDate()-i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    result.push({
      done:completions.includes(key),
      today:key===today,
      dayName:['S','M','T','W','T','F','S'][d.getDay()],
      num:d.getDate()
    });
  }
  return result;
}

function markDaily(id){
  const g=goals.find(g=>g.id===id);
  const today=todayKey();
  g.completions=g.completions||[];
  if(g.completions.includes(today)){
    g.completions=g.completions.filter(d=>d!==today);
    logActivity(g.icon,`Undid ${g.title}`);
  }else{
    g.completions.push(today);
    logActivity(g.icon,`Done: ${g.title}`);
    const streak=calcStreak(g);
    if(streak===7)celebrate('🔥','7-day streak!',`${g.title} — a whole week!`);
    else if(streak===30)celebrate('🌟','30-day streak!',`${g.title} — one whole month!`);
    else if(streak===100)celebrate('💯','100-day streak!',`${g.title} — incredible!`);
  }
  save();render();
}

function incCounter(id){
  const g=goals.find(g=>g.id===id);
  g.count=(g.count||0)+1;
  logActivity(g.icon,`+1 ${g.title} (${g.count}/${g.target})`);
  if(g.count>=g.target){
    celebrate('🏆','Goal reached!',`${g.title} — reached ${g.target}!`);
    g.reachedAt=Date.now();
  }
  save();render();
}

function completeMilestone(id){
  const g=goals.find(g=>g.id===id);
  if(confirm(`Mark "${g.title}" as complete?`)){
    g.completedAt=Date.now();
    logActivity(g.icon,`🏆 Achieved: ${g.title}`);
    celebrate('🏆','Milestone achieved!',g.title);
    save();render();
  }
}

function logActivity(icon,text){
  activity.unshift({icon,text,ts:Date.now()});
}

function celebrate(emoji,title,msg){
  document.getElementById('celEmoji').textContent=emoji;
  document.getElementById('celTitle').textContent=title;
  document.getElementById('celMsg').textContent=msg;
  document.getElementById('celebration').classList.add('show');
}
function closeCelebration(){document.getElementById('celebration').classList.remove('show')}

function openAddGoal(){
  editingId=null;
  selectedEmoji='🎯';
  selectedType='daily';
  document.getElementById('modalTitle').textContent='New Goal';
  document.getElementById('goalTitle').value='';
  document.getElementById('goalTarget').value='';
  document.getElementById('deleteBtn').style.display='none';
  renderEmojiPicker();
  renderTypeSelector();
  updateTargetField();
  document.getElementById('goalModal').classList.add('show');
}

function editGoal(id){
  const g=goals.find(g=>g.id===id);
  editingId=id;
  selectedEmoji=g.icon;
  selectedType=g.type;
  document.getElementById('modalTitle').textContent='Edit Goal';
  document.getElementById('goalTitle').value=g.title;
  document.getElementById('goalTarget').value=g.target||'';
  document.getElementById('deleteBtn').style.display='block';
  renderEmojiPicker();
  renderTypeSelector();
  updateTargetField();
  document.getElementById('goalModal').classList.add('show');
}

function closeModal(){document.getElementById('goalModal').classList.remove('show')}

function renderEmojiPicker(){
  document.getElementById('emojiPicker').innerHTML=EMOJIS.map(e=>`<div class="emoji-option ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');
}
function selectEmoji(e){selectedEmoji=e;renderEmojiPicker()}

function renderTypeSelector(){
  document.querySelectorAll('.type-option').forEach(el=>{
    el.classList.toggle('selected',el.dataset.type===selectedType);
  });
}
function selectType(t){selectedType=t;renderTypeSelector();updateTargetField()}
function updateTargetField(){document.getElementById('targetField').style.display=selectedType==='counter'?'block':'none'}

function saveGoal(){
  const title=document.getElementById('goalTitle').value.trim();
  if(!title)return alert('Give the goal a name!');
  const target=selectedType==='counter'?parseInt(document.getElementById('goalTarget').value)||10:null;
  
  if(editingId){
    const g=goals.find(g=>g.id===editingId);
    g.title=title;g.icon=selectedEmoji;g.type=selectedType;
    if(selectedType==='counter')g.target=target;
  }else{
    goals.push({
      id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      title,icon:selectedEmoji,type:selectedType,target,count:0,completions:[],createdAt:Date.now()
    });
    logActivity(selectedEmoji,`Added goal: ${title}`);
  }
  save();render();closeModal();
}

function deleteGoal(){
  if(confirm('Delete this goal and all its history?')){
    const g=goals.find(g=>g.id===editingId);
    logActivity('🗑️',`Removed: ${g.title}`);
    goals=goals.filter(g=>g.id!==editingId);
    save();render();closeModal();
  }
}

function exportData(){
  const kid=kids.find(k=>k.id===currentKidId);
  const data={kid:kid.name,goals,activity,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`goals-${kid.name.toLowerCase().replace(/\s+/g,'-')}-${todayKey()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=evt=>{
    try{
      const data=JSON.parse(evt.target.result);
      if(!confirm(`Import ${data.goals?.length||0} goals for ${kids.find(k=>k.id===currentKidId).name}? This replaces their current data.`))return;
      goals=data.goals||[];
      activity=data.activity||[];
      save();render();
      alert('Imported!');
    }catch(err){alert('Invalid backup file')}
  };
  reader.readAsText(file);
  e.target.value='';
}

function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return 'just now';
  if(s<3600)return `${Math.floor(s/60)}m`;
  if(s<86400)return `${Math.floor(s/3600)}h`;
  return `${Math.floor(s/86400)}d`;
}

function escape(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

// Seed examples if first time
if(!localStorage.getItem('goals_'+currentKidId)&&!goals.length){
  goals=[
    {id:'seed1',title:'Brush teeth twice',icon:'🦷',type:'daily',completions:[],createdAt:Date.now()},
    {id:'seed2',title:'Read 10 books',icon:'📚',type:'counter',target:10,count:0,createdAt:Date.now()},
    {id:'seed3',title:'Learn to tie shoes',icon:'👟',type:'milestone',createdAt:Date.now()}
  ];
  save();
}

render();
</script>
