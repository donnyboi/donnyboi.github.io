<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Retrieval Practice — ML Exam</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#0f1923;color:#e0e0e0;padding:24px 16px;max-width:900px;margin:0 auto;line-height:1.6;min-height:100vh}
h1{color:#FF9900;font-size:24px;margin-bottom:4px}
.sub{color:#7a8a9e;font-size:13px;margin-bottom:20px}
.setup{background:#162230;border:1px solid #2a3a4e;border-radius:10px;padding:20px;margin-bottom:16px}
.setup h2{color:#56b8ff;font-size:15px;margin-bottom:12px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter{background:#1c2d3f;border:1px solid #2e4058;color:#e0e0e0;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12px;user-select:none}
.filter.active{background:#FF9900;color:#000;border-color:#FF9900;font-weight:700}
.topic-card{background:linear-gradient(135deg,#1a2940,#1e3350);border:2px solid #FF9900;border-radius:12px;padding:24px;margin-bottom:16px;text-align:center}
.topic-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#FF9900;margin-bottom:8px}
.topic-name{font-size:24px;font-weight:700;margin-bottom:8px}
.topic-domain{font-size:13px;color:#7a8a9e}
.timer{font-size:32px;font-weight:700;color:#66d97a;text-align:center;margin:12px 0;font-variant-numeric:tabular-nums}
.timer.warn{color:#f0c850}
.timer.over{color:#ff6b6b}
textarea{width:100%;background:#0f1923;border:1px solid #2a3a4e;color:#e0e0e0;padding:14px;border-radius:8px;font-family:inherit;font-size:14px;line-height:1.6;resize:vertical;min-height:200px}
textarea:focus{outline:none;border-color:#FF9900}
.controls{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap}
button{background:#FF9900;color:#000;border:none;padding:12px 20px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;flex:1;min-width:120px}
button:hover{background:#e88a00}
button.secondary{background:#2a3a4e;color:#e0e0e0}
button.secondary:hover{background:#3a4a5e}
button.success{background:#66d97a}
.answer{background:#1a3a2a;border:1px solid #66d97a;border-radius:10px;padding:20px;margin-top:16px;display:none}
.answer.show{display:block}
.answer h3{color:#66d97a;font-size:15px;margin-bottom:12px}
.answer .key-point{margin:10px 0;padding-left:20px;position:relative}
.answer .key-point::before{content:"▸";color:#66d97a;position:absolute;left:0;font-weight:700}
.answer b{color:#66d97a}
.self-rate{background:#162230;border:1px solid #2a3a4e;border-radius:10px;padding:16px;margin-top:12px;display:none}
.self-rate.show{display:block}
.self-rate h3{font-size:14px;color:#56b8ff;margin-bottom:10px}
.rate-btns{display:flex;gap:8px;flex-wrap:wrap}
.rate-btn{flex:1;min-width:100px;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;text-align:center;border:1px solid}
.rate-btn.poor{background:#3a1a1a;color:#ff6b6b;border-color:#ff6b6b}
.rate-btn.ok{background:#3a2a1a;color:#f0c850;border-color:#f0c850}
.rate-btn.good{background:#1a3a2a;color:#66d97a;border-color:#66d97a}
.stats{background:#162230;border:1px solid #2a3a4e;border-radius:10px;padding:14px;margin-top:16px;display:flex;justify-content:space-around;text-align:center;flex-wrap:wrap;gap:10px}
.stat{flex:1;min-width:80px}
.stat-value{font-size:22px;font-weight:700;color:#FF9900}
.stat-label{font-size:11px;color:#7a8a9e;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.history{margin-top:16px;max-height:200px;overflow-y:auto}
.history-item{background:#0f1923;border:1px solid #2a3a4e;border-radius:6px;padding:8px 12px;margin-bottom:6px;font-size:12px;display:flex;justify-content:space-between}
.history-item .topic{color:#e0e0e0}
.history-item .score{font-weight:700}
.history-item .score.poor{color:#ff6b6b}
.history-item .score.ok{color:#f0c850}
.history-item .score.good{color:#66d97a}
@media(max-width:430px){
  body{padding:16px 12px}
  .topic-name{font-size:20px}
  button{font-size:13px;padding:10px 14px}
  .rate-btn{min-width:0}
}
</style>
</head>
<body>
<a href="index.html" style="color:#7a8a9e;text-decoration:none;font-size:13px;display:inline-block;margin-bottom:12px">‹ Hub</a>
<h1>🎯 Retrieval Practice</h1>
<div class="sub">Pick a domain → get a random topic → write everything you know → compare</div>

<div class="setup">
  <h2>Filter by domain</h2>
  <div class="filters" id="filters"></div>
</div>

<div class="topic-card" id="topicCard" style="display:none">
  <div class="topic-label">Your topic</div>
  <div class="topic-name" id="topicName"></div>
  <div class="topic-domain" id="topicDomain"></div>
</div>

<div id="practiceArea" style="display:none">
  <div class="timer" id="timer">3:00</div>
  <textarea id="userAnswer" placeholder="Write everything you know about this topic. Don't look anything up. Include: what it is, why it exists, when to use it, alternatives, gotchas..."></textarea>
</div>

<div class="controls">
  <button onclick="pickTopic()" id="pickBtn">🎲 Pick random topic</button>
  <button class="secondary" onclick="revealAnswer()" id="revealBtn" style="display:none">👀 Show answer</button>
</div>

<div class="answer" id="answer">
  <h3 id="answerTitle">Key points you should have covered:</h3>
  <div id="answerContent"></div>
</div>

<div class="self-rate" id="selfRate">
  <h3>How did you do?</h3>
  <div class="rate-btns">
    <div class="rate-btn poor" onclick="rate('poor')">😓 Missed most<br><small>Study this</small></div>
    <div class="rate-btn ok" onclick="rate('ok')">🤔 Partial<br><small>Review</small></div>
    <div class="rate-btn good" onclick="rate('good')">✅ Got it<br><small>Revisit in 1 week</small></div>
  </div>
</div>

<div class="stats" id="stats">
  <div class="stat"><div class="stat-value" id="totalCount">0</div><div class="stat-label">Attempted</div></div>
  <div class="stat"><div class="stat-value" style="color:#66d97a" id="goodCount">0</div><div class="stat-label">Solid</div></div>
  <div class="stat"><div class="stat-value" style="color:#f0c850" id="okCount">0</div><div class="stat-label">Partial</div></div>
  <div class="stat"><div class="stat-value" style="color:#ff6b6b" id="poorCount">0</div><div class="stat-label">Weak</div></div>
</div>

<div class="history" id="history"></div>

<script>
const topics=[
// DOMAIN 1 - Data Engineering
{name:"S3 Storage Classes",domain:"D1",points:["<b>7 classes:</b> Standard, Intelligent-Tiering, Standard-IA, One Zone-IA, Glacier Instant, Glacier Flexible, Deep Archive","<b>Min duration:</b> IA=30 days, Glacier Instant/Flex=90 days, Deep Archive=180 days","<b>No retrieval fee:</b> Standard & Intelligent-Tiering only","<b>One Zone-IA:</b> single AZ, cheaper, for reproducible data","<b>Retrieval speeds:</b> Glacier Flexible=1min-12hr, Deep Archive=12-48hr","<b>Lifecycle policies</b> automate transitions between classes"]},
{name:"Parquet File Format",domain:"D1",points:["<b>Columnar</b> storage format","Each column stored together → massive speedup for <b>analytical queries</b> (SELECT one column)","Built-in <b>compression</b> per column type","Self-describing <b>schema</b> in footer","<b>Predicate pushdown</b> — filter data before reading","Native to Spark, Athena, Redshift Spectrum","Compare to Avro (row-based, for streaming)"]},
{name:"AWS Glue",domain:"D1",points:["Serverless ETL service","<b>Crawlers</b> infer schema and populate the <b>Data Catalog</b>","<b>Jobs</b> run Spark or Python shell transformations","<b>Data Catalog</b> is the central metadata repository used by Athena, Redshift Spectrum, EMR","<b>DataBrew</b> = no-code visual data prep (different product)","<b>Glue Studio</b> = visual ETL job builder","Pay per DPU-hour"]},
{name:"Kinesis Data Streams vs Firehose",domain:"D1",points:["<b>Data Streams:</b> real-time, millisecond latency, custom consumers, retention up to 365 days","<b>Firehose:</b> near-real-time (min 60s buffer), managed delivery to S3/Redshift/OpenSearch, no custom consumers","<b>Streams:</b> you manage shards and throughput","<b>Firehose:</b> auto-scales, simpler","<b>Firehose</b> can transform data with Lambda before delivery","Use Firehose when S3/Redshift is the destination"]},
{name:"Lake Formation",domain:"D1",points:["Service on top of Glue + S3 to build data lakes with <b>fine-grained access control</b>","Provides <b>row-level, column-level, cell-level</b> permissions","Centralizes permissions across Glue, Athena, Redshift Spectrum, EMR","<b>LF-Tags</b> = attribute-based access control","Integrates with existing IAM","Solves the 'too many S3 bucket policies' problem"]},
{name:"SageMaker Feature Store",domain:"D1",points:["Central repository for ML features","<b>Online store:</b> low-latency reads for real-time inference","<b>Offline store:</b> S3-backed for training","<b>Feature groups</b> = tables of features with schema","Ensures <b>training/serving consistency</b> (same features used in both)","Time-travel queries via event time","Integrates with SageMaker Pipelines"]},
{name:"Data Ingestion Patterns",domain:"D1",points:["<b>Real-time streaming:</b> Kinesis, MSK (Kafka)","<b>Batch:</b> DataSync (on-prem to AWS), DMS (databases), Snow Family (petabyte scale)","<b>CDC (Change Data Capture):</b> DMS CDC mode for database replication","<b>File uploads:</b> S3 direct, Transfer Family (SFTP)","Choose based on: latency need, data size, source type"]},
// DOMAIN 2 - EDA & Feature Engineering
{name:"Handling Missing Data",domain:"D2",points:["<b>Drop:</b> rows or columns (if % missing is small)","<b>Impute:</b> mean (numerical, no outliers), median (numerical, outliers present), mode (categorical)","<b>Model-based imputation:</b> predict missing values using other features","<b>Forward/backward fill:</b> for time series","<b>Indicator variable:</b> add 'was_missing' column — sometimes missingness itself is signal","Never drop silently on high-missing columns without investigation"]},
{name:"Feature Encoding Methods",domain:"D2",points:["<b>Label encoding:</b> integer per category — only for ordinal or tree-based models","<b>One-hot encoding:</b> binary column per category — for nominal categories, linear models","<b>Target encoding:</b> replace category with mean of target — risk of leakage","<b>Binary encoding:</b> reduces cardinality vs one-hot","<b>Frequency encoding:</b> replace with count","<b>Hashing:</b> for very high cardinality"]},
{name:"Handling Class Imbalance",domain:"D2",points:["<b>Oversampling:</b> SMOTE (synthetic minority) — most common","<b>Undersampling:</b> remove majority class samples","<b>Class weights:</b> tell the model to penalize minority errors more","<b>Use appropriate metrics:</b> precision, recall, F1, AUC — NOT accuracy","<b>Anomaly detection</b> framing for extreme imbalance (fraud)","SageMaker XGBoost has scale_pos_weight parameter"]},
{name:"Feature Scaling",domain:"D2",points:["<b>Standardization (Z-score):</b> mean=0, std=1 — for normally distributed data","<b>Min-Max scaling:</b> scales to [0,1] — preserves distribution shape","<b>Robust scaling:</b> uses median/IQR — for data with outliers","<b>Required for:</b> SVMs, neural networks, k-NN, PCA, k-means","<b>Not required for:</b> tree-based models (XGBoost, Random Forest)","Fit scaler on train, transform both train and test"]},
{name:"Dimensionality Reduction",domain:"D2",points:["<b>PCA:</b> linear, preserves variance, for numerical data","<b>t-SNE:</b> non-linear, for visualization (2D/3D), not for ML input","<b>UMAP:</b> non-linear, faster than t-SNE","<b>Feature selection</b> ≠ extraction: selection picks existing features, extraction creates new","<b>When to use:</b> too many features, multicollinearity, visualization needs","SageMaker has built-in PCA algorithm"]},
{name:"Outlier Detection",domain:"D2",points:["<b>Statistical:</b> Z-score (>3 std), IQR method (1.5x IQR)","<b>Visual:</b> box plots, scatter plots","<b>Model-based:</b> Isolation Forest, DBSCAN, Local Outlier Factor","<b>Domain knowledge:</b> always check if 'outlier' is actually valid data","Handling: remove, cap (winsorize), transform (log), or keep and use robust models"]},
// DOMAIN 3 - Model Development
{name:"XGBoost",domain:"D3",points:["<b>Gradient boosting</b> on decision trees — ensemble of weak learners","Handles missing values natively","<b>Regularization</b> built-in (L1/L2)","Fast, scalable, dominates tabular data competitions","SageMaker built-in algorithm","Key hyperparams: <b>max_depth, eta (learning rate), num_round, subsample</b>","Good for classification AND regression"]},
{name:"Evaluation Metrics - Classification",domain:"D3",points:["<b>Accuracy:</b> (TP+TN)/total — misleading with imbalance","<b>Precision:</b> TP/(TP+FP) — 'of what I predicted positive, how many are right?'","<b>Recall:</b> TP/(TP+FN) — 'of actual positives, how many did I catch?'","<b>F1:</b> harmonic mean of precision/recall","<b>ROC-AUC:</b> threshold-independent, good for imbalanced","<b>PR-AUC:</b> better than ROC-AUC for heavily imbalanced data","<b>Confusion matrix</b> shows TP/FP/TN/FN"]},
{name:"Evaluation Metrics - Regression",domain:"D3",points:["<b>MSE:</b> mean squared error — penalizes large errors heavily","<b>RMSE:</b> root MSE, same units as target","<b>MAE:</b> mean absolute error, less sensitive to outliers","<b>R²:</b> proportion of variance explained, 0-1 scale","<b>MAPE:</b> mean absolute percentage error — for comparing across scales","Choose based on whether outliers matter and interpretability needs"]},
{name:"Hyperparameter Tuning",domain:"D3",points:["<b>Grid search:</b> exhaustive, slow, works on small spaces","<b>Random search:</b> often better than grid for same budget","<b>Bayesian optimization:</b> smart — uses past results to pick next (SageMaker AMT default)","<b>Hyperband:</b> resource-efficient early stopping","SageMaker <b>Automatic Model Tuning (AMT)</b> supports Bayesian and Hyperband","Key params to tune: learning rate, depth, regularization, batch size"]},
{name:"Overfitting vs Underfitting",domain:"D3",points:["<b>Overfitting:</b> low training error, high test error — model memorized noise","<b>Underfitting:</b> high training and test error — model too simple","<b>Fixes for overfitting:</b> more data, regularization (L1/L2), dropout, early stopping, reduce complexity","<b>Fixes for underfitting:</b> more features, more complex model, more training time, less regularization","<b>Bias-variance tradeoff:</b> simpler models = high bias, complex = high variance","Cross-validation helps detect both"]},
{name:"Cross-Validation",domain:"D3",points:["<b>K-Fold:</b> split data into K folds, train on K-1, test on 1, repeat","<b>Stratified K-Fold:</b> preserves class distribution — use for classification","<b>Time Series Split:</b> forward-chaining, never train on future","<b>Leave-One-Out:</b> K = N, expensive but unbiased","Prevents overfitting, gives robust performance estimate","Use for hyperparameter tuning and model selection"]},
{name:"SageMaker Built-in Algorithms",domain:"D3",points:["<b>XGBoost:</b> tabular classification/regression","<b>Linear Learner:</b> linear/logistic regression at scale","<b>K-Means:</b> clustering","<b>PCA:</b> dimensionality reduction","<b>BlazingText:</b> word2vec and text classification","<b>DeepAR:</b> time series forecasting (RNN-based)","<b>Object2Vec:</b> general purpose embedding","<b>Image Classification, Object Detection, Semantic Segmentation:</b> computer vision","<b>Random Cut Forest:</b> anomaly detection","<b>Seq2Seq:</b> NLP translation"]},
// DOMAIN 4 - MLOps
{name:"SageMaker Endpoint Types",domain:"D4",points:["<b>Real-time:</b> always-on, millisecond latency, pay per instance-hour","<b>Serverless:</b> scales to zero, pay per invocation, cold starts possible","<b>Async:</b> queue-based, for large payloads, minutes OK","<b>Batch Transform:</b> score entire dataset offline, no endpoint","<b>Multi-Model Endpoint:</b> thousands of models behind one endpoint","<b>Multi-Container:</b> chain containers (preprocessing → inference → postprocessing)"]},
{name:"SageMaker Model Monitor",domain:"D4",points:["<b>4 monitor types:</b> Data Quality, Model Quality, Bias Drift, Feature Attribution Drift","<b>Baseline</b> captured from training data statistics","Monitoring jobs run on schedule (hourly/daily)","Compares live endpoint traffic against baseline","Violations → CloudWatch alarm → SNS → retraining trigger","<b>Data drift:</b> input distribution changes","<b>Concept drift:</b> feature-target relationship changes","Model Quality requires ground truth labels"]},
{name:"Deployment Strategies",domain:"D4",points:["<b>All-at-once:</b> replace immediately, high risk","<b>Blue/Green:</b> two full environments, instant switch","<b>Canary:</b> small % traffic to new model first (e.g., 5%)","<b>Linear/Rolling:</b> gradually shift traffic (10%→20%→...)","<b>Shadow:</b> new model gets traffic but responses discarded — compare without risk","Choose based on risk tolerance and ability to rollback"]},
{name:"SageMaker Pipelines",domain:"D4",points:["End-to-end ML workflow orchestration","<b>Step types:</b> Processing, Training, Tuning, Condition, Register, CreateModel, Lambda, Callback, Fail","<b>ConditionStep</b> branches on metrics (if accuracy > threshold, proceed)","<b>RegisterModel</b> adds to Model Registry for approval","Pipeline definitions versioned and reusable","Integrates with EventBridge for scheduling","DAG executed in parallel where possible"]},
{name:"SageMaker Model Registry",domain:"D4",points:["Central catalog of trained models","Tracks model versions, metadata, lineage","<b>Approval states:</b> PendingManualApproval → Approved → Rejected","CI/CD integration — only approved models deploy","Model packages grouped by <b>Model Package Group</b>","Enables governance: who approved what, when","Cross-account model sharing"]},
{name:"SageMaker Clarify",domain:"D4",points:["<b>Pre-training bias:</b> in the data itself","<b>Post-training bias:</b> in model predictions","<b>Explainability:</b> SHAP values for feature importance","<b>Key metrics:</b> CI (Class Imbalance), DPL (Diff Proportions of Labels), DI (Disparate Impact)","Integrates with Model Monitor for bias drift","Generates reports for compliance/audit","Important for regulated industries"]},
{name:"Cost Optimization for ML",domain:"D4",points:["<b>Spot Instances</b> for training: up to 90% savings, use checkpointing","<b>Serverless Inference</b> for sporadic traffic","<b>Multi-Model Endpoints</b>: one endpoint, many models","<b>Auto-scaling</b> endpoints based on InvocationsPerInstance","<b>Savings Plans</b> for committed usage","<b>Inference Recommender</b> finds optimal instance","<b>Batch Transform</b> instead of always-on endpoints when possible"]},
{name:"Security for ML in Production",domain:"D4",points:["<b>KMS encryption</b> for S3, EBS, model artifacts","<b>VPC mode:</b> SageMaker in your VPC, no public internet","<b>Network isolation mode:</b> containers can't make outbound calls","<b>IAM execution roles</b> least privilege per pipeline step","<b>PrivateLink</b> for SageMaker API access","<b>CloudTrail</b> logs all API calls","<b>Inter-container traffic encryption</b> for distributed training"]}
];

const domains={"ALL":"All domains","D1":"Data Engineering","D2":"EDA & Feature Engineering","D3":"Model Development","D4":"MLOps & Deployment"};
let activeDomain="ALL",currentTopic=null,timerInterval=null,history=JSON.parse(localStorage.getItem('retrievalHistory')||'[]');

function renderFilters(){
  const f=document.getElementById('filters');
  f.innerHTML='';
  Object.entries(domains).forEach(([k,v])=>{
    const d=document.createElement('div');
    d.className='filter'+(activeDomain===k?' active':'');
    d.textContent=v;
    d.onclick=()=>{activeDomain=k;renderFilters()};
    f.appendChild(d);
  });
}

function pickTopic(){
  const pool=activeDomain==="ALL"?topics:topics.filter(t=>t.domain===activeDomain);
  currentTopic=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('topicName').textContent=currentTopic.name;
  document.getElementById('topicDomain').textContent=domains[currentTopic.domain];
  document.getElementById('topicCard').style.display='block';
  document.getElementById('practiceArea').style.display='block';
  document.getElementById('userAnswer').value='';
  document.getElementById('answer').classList.remove('show');
  document.getElementById('selfRate').classList.remove('show');
  document.getElementById('revealBtn').style.display='inline-block';
  document.getElementById('pickBtn').textContent='🎲 Pick another';
  startTimer();
  document.getElementById('userAnswer').focus();
}

function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  let seconds=180;
  const t=document.getElementById('timer');
  const update=()=>{
    const m=Math.floor(seconds/60),s=seconds%60;
    t.textContent=`${m}:${s.toString().padStart(2,'0')}`;
    t.className='timer'+(seconds<=60?' warn':'')+(seconds<=0?' over':'');
    if(seconds<=0)t.textContent=`+${Math.floor(-seconds/60)}:${(-seconds%60).toString().padStart(2,'0')}`;
    seconds--;
  };
  update();
  timerInterval=setInterval(update,1000);
}

function revealAnswer(){
  if(timerInterval)clearInterval(timerInterval);
  const c=document.getElementById('answerContent');
  c.innerHTML=currentTopic.points.map(p=>`<div class="key-point">${p}</div>`).join('');
  document.getElementById('answer').classList.add('show');
  document.getElementById('selfRate').classList.add('show');
}

function rate(score){
  history.unshift({topic:currentTopic.name,domain:currentTopic.domain,score,date:new Date().toISOString()});
  if(history.length>50)history=history.slice(0,50);
  localStorage.setItem('retrievalHistory',JSON.stringify(history));
  document.getElementById('selfRate').classList.remove('show');
  renderStats();
  renderHistory();
}

function renderStats(){
  document.getElementById('totalCount').textContent=history.length;
  document.getElementById('goodCount').textContent=history.filter(h=>h.score==='good').length;
  document.getElementById('okCount').textContent=history.filter(h=>h.score==='ok').length;
  document.getElementById('poorCount').textContent=history.filter(h=>h.score==='poor').length;
}

function renderHistory(){
  const h=document.getElementById('history');
  h.innerHTML=history.slice(0,10).map(item=>{
    const d=new Date(item.date).toLocaleDateString();
    return `<div class="history-item"><span class="topic">${item.topic} <small style="color:#7a8a9e">${d}</small></span><span class="score ${item.score}">${item.score==='good'?'✓':item.score==='ok'?'~':'✗'}</span></div>`;
  }).join('');
}

renderFilters();
renderStats();
renderHistory();
</script>
</body>
</html>
