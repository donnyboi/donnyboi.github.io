<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,viewport-fit=cover">
<title>Hyperparameters — Flashcards</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#0f1923;color:#e0e0e0;display:flex;flex-direction:column;align-items:center;min-height:100vh;min-height:-webkit-fill-available;padding:20px 16px;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
.back-link{color:#7a8a9e;text-decoration:none;font-size:13px;align-self:flex-start;margin-bottom:12px}
.back-link:hover{color:#FF9900}
h1{color:#FF9900;font-size:20px;margin-bottom:4px;text-align:center}
.sub{color:#7a8a9e;font-size:12px;margin-bottom:18px;text-align:center}
.progress{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;max-width:100%}
.dot{width:10px;height:10px;border-radius:50%;background:#1c2d3f;border:1px solid #2e4058;transition:.3s;cursor:pointer}
.dot.active{background:#FF9900;border-color:#FF9900}
.dot.correct{background:#66d97a;border-color:#66d97a}
.dot.incorrect{background:#ff6b6b;border-color:#ff6b6b}
.card-container{perspective:1000px;width:100%;max-width:560px;height:340px;margin-bottom:16px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transition:transform .5s;transform-style:preserve-3d}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center;overflow-y:auto;-webkit-overflow-scrolling:touch}
.front{background:linear-gradient(135deg,#1a2940,#1e3350);border:2px solid #FF9900}
.back{background:linear-gradient(135deg,#1a3a2a,#1e4035);border:2px solid #66d97a;transform:rotateY(180deg)}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#FF9900;margin-bottom:10px;flex-shrink:0}
.back .card-label{color:#66d97a}
.card-question{font-size:17px;font-weight:700;line-height:1.4}
.card-question .algo-tag{display:inline-block;background:rgba(255,153,0,0.15);color:#FF9900;padding:3px 10px;border-radius:12px;font-size:11px;margin-bottom:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.card-question code{background:#0a1420;padding:3px 8px;border-radius:6px;color:#FF9900;font-family:'SF Mono',Menlo,monospace;font-size:15px}
.card-answer{font-size:13px;line-height:1.7;text-align:left;width:100%}
.card-answer b{color:#FF9900}
.card-answer .highlight{color:#66d97a;font-weight:600}
.card-answer .row{margin:4px 0}
.card-answer code{background:#0a1420;padding:2px 6px;border-radius:4px;color:#FF9900;font-family:'SF Mono',Menlo,monospace;font-size:12px}
.card-answer .tag{display:inline-block;background:rgba(102,217,122,0.15);color:#66d97a;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0;font-weight:600}
.hint{font-size:11px;color:#5a6a7e;margin-top:12px;font-style:italic;flex-shrink:0}
.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;justify-content:center;width:100%;max-width:560px}
button{background:#1c2d3f;border:1px solid #2e4058;color:#e0e0e0;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;transition:.2s;-webkit-user-select:none;user-select:none}
button:active{background:#2a3a4e;border-color:#FF9900}
.btn-primary{background:#FF9900;color:#000;font-weight:700;border-color:#FF9900}
.btn-primary:active{background:#e88a00}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.filter{background:#1c2d3f;border:1px solid #2e4058;color:#e0e0e0;padding:5px 11px;border-radius:16px;cursor:pointer;font-size:11px;font-weight:600;user-select:none}
.filter.active{background:#FF9900;color:#000;border-color:#FF9900}
.score{color:#7a8a9e;font-size:13px;margin-bottom:6px}
.tracker{display:flex;gap:16px;margin-bottom:12px}
.tracker span{font-size:13px}
.tracker .right{color:#66d97a}
.tracker .wrong{color:#ff6b6b}
.shuffle-note{color:#5a6a7e;font-size:11px}
@media(max-width:430px){
  body{padding:16px 12px}
  h1{font-size:17px}
  .card-container{height:340px}
  .card-face{padding:16px}
  .card-question{font-size:15px}
  .card-answer{font-size:12px}
  .controls{gap:6px}
  button{padding:10px 10px;font-size:12px;flex:1;min-width:0}
}
</style>
</head>
<body>
<a class="back-link" href="flashcards.html">‹ Decks</a>
<h1>Hyperparameters — Flashcards</h1>
<div class="sub">What each hyperparameter does · effect when increased/decreased</div>

<div class="filter-row" id="filters"></div>
<div class="progress" id="progress"></div>
<div class="score" id="score">Card 1 of 0</div>
<div class="tracker">
  <span class="right" id="rightCount">✓ 0</span>
  <span class="wrong" id="wrongCount">✗ 0</span>
</div>

<div class="card-container" id="cardContainer">
  <div class="card" id="card">
    <div class="card-face front">
      <div class="card-label">Question</div>
      <div class="card-question" id="question"></div>
      <div class="hint">Tap / swipe to flip</div>
    </div>
    <div class="card-face back">
      <div class="card-label">Answer</div>
      <div class="card-answer" id="answer"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button onclick="prev()">← Prev</button>
  <button onclick="markCard('incorrect')">✗ Didn't Know</button>
  <button onclick="markCard('correct')">✓ Got It</button>
  <button onclick="next()">Next →</button>
</div>
<button class="btn-primary" onclick="shuffle()">🔀 Shuffle & Reset</button>
<div class="shuffle-note">Filter by algorithm · shuffle to randomize</div>

<script>
const allCards=[
// === XGBoost ===
{cat:"XGBoost",q:"<span class='algo-tag'>XGBoost</span><code>eta</code><br>(aka learning_rate)",a:"<b>Step size</b> for each tree's contribution to the ensemble.<div class='row'><span class='tag'>Range: 0.01 – 0.3</span></div><b>Lower eta</b> = each tree contributes less → need <span class='highlight'>more rounds</span>, but usually generalizes better.<br><b>Higher eta</b> = each tree contributes more → trains faster but risks overfitting.<div class='row'><b>Rule of thumb:</b> lower eta + more num_round = better than high eta + few rounds.</div>"},
{cat:"XGBoost",q:"<span class='algo-tag'>XGBoost</span><code>max_depth</code>",a:"<b>Maximum depth</b> of each decision tree.<div class='row'><span class='tag'>Range: 3 – 10</span></div><b>Higher</b> = more complex trees, can capture deeper interactions, <span class='highlight'>more prone to overfitting</span>.<br><b>Lower</b> = simpler trees, less overfitting, may underfit.<div class='row'>Most important tree-shape parameter.</div>"},
{cat:"XGBoost",q:"<span class='algo-tag'>XGBoost</span><code>num_round</code><br>(aka n_estimators)",a:"<b>Number of boosting rounds</b> — i.e., how many trees to train.<div class='row'><span class='tag'>Range: 100 – 1000+</span></div><b>More rounds</b> = more chances to correct errors, but <span class='highlight'>risk of overfitting</span>.<br><b>Fewer rounds</b> = underfitting.<div class='row'>Use <b>early stopping</b> with a validation set to pick the right number.</div>"},
{cat:"XGBoost",q:"<span class='algo-tag'>XGBoost</span><code>subsample</code>",a:"<b>Fraction of training rows</b> randomly sampled for each tree.<div class='row'><span class='tag'>Range: 0.5 – 1.0</span></div><b>Lower</b> = more randomness → <span class='highlight'>reduces overfitting</span>, similar effect to bagging.<br><b>1.0</b> = every tree sees all rows.<div class='row'>Typical sweet spot: 0.7 – 0.9.</div>"},
{cat:"XGBoost",q:"<span class='algo-tag'>XGBoost</span><code>colsample_bytree</code>",a:"<b>Fraction of features (columns)</b> randomly sampled for each tree.<div class='row'><span class='tag'>Range: 0.5 – 1.0</span></div>Similar to Random Forest's feature subsampling. <span class='highlight'>Reduces overfitting</span> and adds randomness.<div class='row'>Useful when you have many correlated features.</div>"},
{cat:"XGBoost",q:"<span class='algo-tag'>XGBoost</span><code>scale_pos_weight</code>",a:"<b>Balances positive vs negative classes</b> for imbalanced binary classification.<div class='row'><span class='tag'>Rule: count(negative) / count(positive)</span></div>Example: 99% negatives, 1% positives → set to <code>99</code>.<br><span class='highlight'>Critical for fraud detection and rare-event problems.</span>"},
{cat:"XGBoost",q:"<span class='algo-tag'>XGBoost</span><code>gamma</code><br>(aka min_split_loss)",a:"<b>Minimum loss reduction</b> required to split a node further.<div class='row'><span class='tag'>Range: 0 – 20+</span></div><b>Higher</b> = stricter splits → <span class='highlight'>less complex trees, more regularization</span>.<br><b>0</b> = any improvement allowed.<div class='row'>Controls tree complexity in a different way than max_depth.</div>"},
{cat:"XGBoost",q:"<span class='algo-tag'>XGBoost</span><code>alpha</code> and <code>lambda</code>",a:"<b>Regularization terms</b> on leaf weights.<div class='row'><b>alpha</b> = L1 regularization (sparsity)<br><b>lambda</b> = L2 regularization (smoothness)</div>Both <span class='highlight'>reduce overfitting</span> by penalizing extreme leaf values.<br>Lambda usually default 1; alpha usually default 0."},

// === Neural Networks / Deep Learning ===
{cat:"Neural Net",q:"<span class='algo-tag'>Neural Net</span><code>learning_rate</code>",a:"<b>Step size</b> for gradient descent updates to weights.<div class='row'><span class='tag'>Range: 1e-5 – 1e-1</span></div><b>Too high</b> = training <span class='highlight'>diverges</span> or oscillates, loss explodes.<br><b>Too low</b> = trains very slowly, may get stuck in local minima.<div class='row'>Most important hyperparameter in deep learning.</div>"},
{cat:"Neural Net",q:"<span class='algo-tag'>Neural Net</span><code>batch_size</code>",a:"<b>Number of samples</b> processed before updating weights.<div class='row'><span class='tag'>Typical: 32, 64, 128, 256</span></div><b>Small batch</b> = noisier gradients, can escape local minima, slower per epoch.<br><b>Large batch</b> = smoother gradients, faster per epoch, <span class='highlight'>needs more GPU memory</span>, may generalize worse."},
{cat:"Neural Net",q:"<span class='algo-tag'>Neural Net</span><code>epochs</code>",a:"<b>Number of times</b> the entire training dataset is passed through the model.<div class='row'><span class='tag'>Range: 10 – 1000</span></div><b>Too few</b> = <span class='highlight'>underfitting</span>.<br><b>Too many</b> = overfitting on training data.<div class='row'>Use <b>early stopping</b> on validation loss to pick automatically.</div>"},
{cat:"Neural Net",q:"<span class='algo-tag'>Neural Net</span><code>dropout</code>",a:"<b>Fraction of neurons</b> randomly 'dropped' during training.<div class='row'><span class='tag'>Range: 0.1 – 0.5</span></div>Prevents neurons from co-adapting → <span class='highlight'>reduces overfitting</span>.<br>Only active during training; all neurons used at inference.<div class='row'>Higher dropout for wider networks.</div>"},
{cat:"Neural Net",q:"<span class='algo-tag'>Neural Net</span><code>optimizer</code>",a:"<b>Algorithm for updating weights</b> during training.<div class='row'><b>SGD:</b> simple, often needs tuning<br><b>Momentum:</b> SGD + velocity for smoother descent<br><b>Adam:</b> adaptive per-parameter learning rates, <span class='highlight'>most common default</span><br><b>RMSprop:</b> good for RNNs</div>"},
{cat:"Neural Net",q:"<span class='algo-tag'>Neural Net</span>Activation function choice",a:"<b>Non-linearity applied after each layer.</b><div class='row'><b>ReLU:</b> default for hidden layers, avoids vanishing gradients<br><b>Sigmoid:</b> binary output, suffers from <span class='highlight'>vanishing gradient</span><br><b>Softmax:</b> multi-class output (probabilities sum to 1)<br><b>Tanh:</b> zero-centered sigmoid, for RNNs</div>"},
{cat:"Neural Net",q:"<span class='algo-tag'>Neural Net</span><code>weight_decay</code><br>(L2 regularization)",a:"<b>Penalty on weight magnitudes</b> added to the loss.<div class='row'><span class='tag'>Range: 1e-5 – 1e-2</span></div>Encourages <span class='highlight'>smaller weights</span> → smoother functions → less overfitting.<br>Equivalent to adding <code>λ · ||w||²</code> to the loss."},

// === Linear Learner ===
{cat:"Linear Learner",q:"<span class='algo-tag'>Linear Learner</span><code>predictor_type</code>",a:"<b>Type of prediction task.</b><div class='row'><b>binary_classifier:</b> two classes<br><b>multiclass_classifier:</b> N classes<br><b>regressor:</b> continuous output</div>Linear Learner <span class='highlight'>trains multiple models in parallel</span> and picks the best on validation."},
{cat:"Linear Learner",q:"<span class='algo-tag'>Linear Learner</span><code>l1</code> and <code>wd</code>",a:"<b>Regularization parameters.</b><div class='row'><b>l1:</b> L1 regularization (Lasso — produces <span class='highlight'>sparse coefficients</span>, feature selection)<br><b>wd:</b> L2 weight decay (Ridge — smooths coefficients)</div>Both prevent overfitting on high-dim sparse data."},

// === K-Means ===
{cat:"K-Means",q:"<span class='algo-tag'>K-Means</span><code>k</code>",a:"<b>Number of clusters</b> to form.<div class='row'><span class='tag'>Must be specified upfront</span></div>Pick using:<br><b>Elbow method</b> — plot inertia vs k, look for the 'elbow'<br><b>Silhouette score</b> — measures cluster separation<br><span class='highlight'>Getting k wrong is the biggest source of bad clustering.</span>"},
{cat:"K-Means",q:"<span class='algo-tag'>K-Means</span><code>init_method</code>",a:"<b>How initial centroids are chosen.</b><div class='row'><b>random:</b> pick K random points → can converge to poor solutions<br><b>kmeans++:</b> spreads initial centroids apart → <span class='highlight'>more reliable convergence</span> (usually default)</div>"},

// === PCA ===
{cat:"PCA",q:"<span class='algo-tag'>PCA</span><code>num_components</code>",a:"<b>Number of principal components</b> to keep.<div class='row'>Choose based on <span class='highlight'>explained variance ratio</span> — typically keep enough to explain 90-95% of variance.</div>More components = less info loss, but less dimensionality reduction benefit."},
{cat:"PCA",q:"<span class='algo-tag'>PCA</span><code>algorithm_mode</code>",a:"<b>SageMaker PCA computation mode.</b><div class='row'><b>regular:</b> small/medium datasets, exact solution<br><b>randomized:</b> large datasets, <span class='highlight'>approximate but much faster</span></div>Choose based on dataset size."},

// === DeepAR ===
{cat:"DeepAR",q:"<span class='algo-tag'>DeepAR</span><code>context_length</code>",a:"<b>How many past time steps</b> the model sees when making a forecast.<div class='row'>Should typically match or exceed <span class='highlight'>prediction_length</span>.</div>Longer context = more memory of patterns but <span class='highlight'>more compute</span>."},
{cat:"DeepAR",q:"<span class='algo-tag'>DeepAR</span><code>prediction_length</code>",a:"<b>How many time steps into the future</b> to forecast.<div class='row'><span class='tag'>Fixed at training time</span></div>Can't change at inference. If you need different horizons, train multiple models.<br><span class='highlight'>Typical: 7–30 steps for daily data.</span>"},
{cat:"DeepAR",q:"<span class='algo-tag'>DeepAR</span><code>epochs</code> and <code>mini_batch_size</code>",a:"<b>Training duration and batch size.</b><div class='row'><b>epochs:</b> how many passes over training data (default 100)<br><b>mini_batch_size:</b> typically 128</div>DeepAR is an RNN → needs enough epochs to learn temporal patterns."},

// === Random Cut Forest ===
{cat:"RCF",q:"<span class='algo-tag'>RCF</span><code>num_trees</code>",a:"<b>Number of trees</b> in the forest for anomaly detection.<div class='row'><span class='tag'>Default: 100</span></div>More trees = <span class='highlight'>more stable anomaly scores</span> but longer training and inference.<br>Diminishing returns beyond ~100."},
{cat:"RCF",q:"<span class='algo-tag'>RCF</span><code>num_samples_per_tree</code>",a:"<b>Number of random samples</b> per tree.<div class='row'><span class='tag'>Default: 256</span></div><b>Key rule:</b> 1/num_samples_per_tree should approximate the <span class='highlight'>expected anomaly rate</span>.<br>Example: 1% anomalies → 100 samples per tree."},

// === BlazingText ===
{cat:"BlazingText",q:"<span class='algo-tag'>BlazingText</span><code>mode</code>",a:"<b>Training mode</b>:<div class='row'><b>batch_skipgram:</b> Word2Vec skip-gram (CPU-parallelizable)<br><b>skipgram:</b> classic skip-gram (GPU)<br><b>cbow:</b> Continuous Bag of Words<br><b>supervised:</b> <span class='highlight'>text classification</span> (like fastText)</div>"},
{cat:"BlazingText",q:"<span class='algo-tag'>BlazingText</span><code>vector_dim</code>",a:"<b>Dimensionality of word embeddings.</b><div class='row'><span class='tag'>Typical: 100 – 300</span></div>Higher = <span class='highlight'>richer representations</span>, but more memory and training time.<br>100 often sufficient for smaller vocabularies."},
{cat:"BlazingText",q:"<span class='algo-tag'>BlazingText</span><code>window_size</code>",a:"<b>Context window</b> around each word (how many words on each side are considered context).<div class='row'><span class='tag'>Typical: 5</span></div>Larger window = captures <span class='highlight'>broader semantic relationships</span>.<br>Smaller = captures <span class='highlight'>syntactic relationships</span>."},

// === Object Detection / Image Classification ===
{cat:"Vision",q:"<span class='algo-tag'>Object Detection</span><code>num_classes</code> and <code>num_training_samples</code>",a:"<b>Required parameters</b>:<div class='row'><b>num_classes:</b> how many object categories to detect<br><b>num_training_samples:</b> total training images — used to calculate lr schedule</div>Must be set accurately; wrong values cause poor convergence."},
{cat:"Vision",q:"<span class='algo-tag'>Image Classification</span><code>use_pretrained_model</code>",a:"<b>Enables transfer learning</b> from ImageNet.<div class='row'><b>1:</b> start from pretrained weights (<span class='highlight'>recommended</span>)<br><b>0:</b> train from scratch</div>Pretrained → <span class='highlight'>much faster convergence</span>, needs less data, better accuracy."},
{cat:"Vision",q:"<span class='algo-tag'>Vision</span><code>augmentation_type</code>",a:"<b>Data augmentation</b> to artificially expand training set.<div class='row'><b>crop:</b> random crops<br><b>crop_color:</b> crops + color jitter<br><b>crop_color_transform:</b> above + rotations/flips</div>More aggressive augmentation → <span class='highlight'>better generalization</span>, especially on small datasets."},

// === General / Tuning ===
{cat:"General",q:"<span class='algo-tag'>General</span>Early stopping",a:"<b>Stop training</b> when validation loss stops improving.<div class='row'><b>patience:</b> number of epochs to wait before stopping<br><b>min_delta:</b> minimum improvement to count</div>Prevents overfitting and saves compute. <span class='highlight'>Always use when you have a validation set.</span>"},
{cat:"General",q:"<span class='algo-tag'>General</span>What's the difference between a <b>parameter</b> and a <b>hyperparameter</b>?",a:"<b>Parameter:</b> learned by the model during training (e.g., weights, biases, tree splits).<div class='row'><b>Hyperparameter:</b> <span class='highlight'>set before training</span> by you (e.g., learning rate, max_depth, num_trees).</div>Hyperparameters control how parameters are learned."},
{cat:"General",q:"<span class='algo-tag'>General</span>What does SageMaker <b>Automatic Model Tuning (AMT)</b> optimize?",a:"<b>Hyperparameter tuning job</b> — finds the best combination of hyperparameters.<div class='row'>Supports:<br><b>Bayesian optimization:</b> smart — uses past results to guide next trial (<span class='highlight'>default</span>)<br><b>Random search:</b> picks random combinations<br><b>Hyperband:</b> resource-efficient early stopping<br><b>Grid search:</b> exhaustive</div>"}
];

let cards=[...allCards];
let current=0,right=0,wrong=0,results=[],activeFilter='ALL';

const categories=['ALL',...new Set(allCards.map(c=>c.cat))];

function renderFilters(){
  const f=document.getElementById('filters');
  f.innerHTML='';
  categories.forEach(cat=>{
    const d=document.createElement('div');
    d.className='filter'+(activeFilter===cat?' active':'');
    d.textContent=cat;
    d.onclick=()=>{activeFilter=cat;applyFilter()};
    f.appendChild(d);
  });
}

function applyFilter(){
  cards=activeFilter==='ALL'?[...allCards]:allCards.filter(c=>c.cat===activeFilter);
  current=0;right=0;wrong=0;results=cards.map(()=>null);
  renderFilters();unflip();show();
}

function renderDots(){
  const p=document.getElementById('progress');
  p.innerHTML='';
  cards.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===current?' active':'')+(results[i]==='correct'?' correct':'')+(results[i]==='incorrect'?' incorrect':'');
    d.onclick=()=>{current=i;unflip();show()};
    p.appendChild(d);
  });
}

function show(){
  if(!cards.length)return;
  document.getElementById('question').innerHTML=cards[current].q;
  document.getElementById('answer').innerHTML=cards[current].a;
  document.getElementById('score').textContent=`Card ${current+1} of ${cards.length}`;
  document.getElementById('rightCount').textContent=`✓ ${right}`;
  document.getElementById('wrongCount').textContent=`✗ ${wrong}`;
  renderDots();
}

function unflip(){document.getElementById('card').classList.remove('flipped')}

document.getElementById('cardContainer').onclick=()=>{
  document.getElementById('card').classList.toggle('flipped');
};

function next(){if(current<cards.length-1){current++;unflip();show()}}
function prev(){if(current>0){current--;unflip();show()}}

function markCard(result){
  if(results[current]===null){
    if(result==='correct')right++;else wrong++;
  }else{
    if(results[current]==='correct'&&result==='incorrect'){right--;wrong++}
    if(results[current]==='incorrect'&&result==='correct'){wrong--;right++}
  }
  results[current]=result;
  show();
  if(current<cards.length-1)setTimeout(()=>next(),300);
}

function shuffle(){
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]]}
  current=0;right=0;wrong=0;results=cards.map(()=>null);unflip();show();
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  if(e.key==='ArrowLeft')prev();
  if(e.key===' '){e.preventDefault();document.getElementById('card').classList.toggle('flipped')}
});

let touchStartX=0,touchStartY=0;
document.getElementById('cardContainer').addEventListener('touchstart',e=>{
  touchStartX=e.changedTouches[0].screenX;
  touchStartY=e.changedTouches[0].screenY;
},{passive:true});
document.getElementById('cardContainer').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].screenX-touchStartX;
  const dy=e.changedTouches[0].screenY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
    if(dx<0)next();else prev();
    e.preventDefault();
  }
});

applyFilter();
</script>
</body>
</html>
